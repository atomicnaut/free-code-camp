<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Survey Form</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>freeCodeCamp Survey Form</h1>
			<p>Thank you for taking the time to help us improve the platform</p>
		</header>

		<main>
			<form action="">
				<label for="name">Name</label>
				<input
					type="text"
					id="name"
					placeholder="Enter your name"
					name="name"
					required
				/>

				<label for="email">Email</label>
				<input
					type="email"
					id="email"
					placeholder="Enter your email"
					name="email"
					required
				/>

				<label for="age">Age <span>(optional)</span></label>
				<input
					type="number"
					id="age"
					placeholder="Age"
					name="Age"
					required
				/>

				<label for="role"
					>Which option best describes your current role?</label
				>
				<select id="role" name="role" required>
					<option value="">Select current role</option>
					<option value="student">Student</option>
					<option value="job">Full Time Job</option>
					<option value="earner">Full Time Learner</option>
					<option value="none">Prefer not to say</option>
					<option value="other">Other</option>
				</select>

				<p class="label">
					Would you recommend freeCodeCamp to a friend?
				</p>
				<label class="radio-label" for="definitely"
					><input
						name="recommend"
						class="inline"
						id="definitely"
						type="radio"
						value="definitely"
						checked
					/>
					Definitely</label
				>
				<label class="radio-label" for="maybe">
					<input
						name="recommend"
						class="inline"
						id="maybe"
						type="radio"
						value="maybe"
					/>
					Maybe
				</label>
				<label class="radio-label" for="not-sure">
					<input
						name="recommend"
						class="inline"
						id="not-sure"
						type="radio"
						value="not-sure"
					/>
					Not sure
				</label>

				<label class="feature-label" for="feature"
					>What is your favorite feature of freeCodeCamp?</label
				>
				<select id="feature" name="feature" required>
					<option value="">Select an option</option>
					<option value="challenges">Challenges</option>
					<option value="projects">Projects</option>
					<option value="community">Community</option>
					<option value="open-source">Open Source</option>
				</select>

				<p class="label">
					What would you like to see improved?
					<span>(Check all that apply)</span>
				</p>
				<label class="checkbox-label" for="front-end"
					><input
						name="improved"
						class="inline"
						id="front-end"
						type="checkbox"
						value="front-end"
					/>
					Front-end Projects</label
				>
				<label class="checkbox-label" for="back-end"
					><input
						name="improved"
						class="inline"
						id="back-end"
						type="checkbox"
						value="back-end"
					/>
					Back-end Projects</label
				>
				<label class="checkbox-label" for="data"
					><input
						name="improved"
						class="inline"
						id="data"
						type="checkbox"
						value="data"
					/>
					Data Visualization</label
				>
				<label class="checkbox-label" for="challenges"
					><input
						name="improved"
						class="inline"
						id="challenges"
						type="checkbox"
						value="challenges"
					/>
					Challenges</label
				>
				<label class="checkbox-label" for="open-source"
					><input
						name="improved"
						class="inline"
						id="open-source"
						type="checkbox"
						value="open-source"
					/>
					Open Source Community</label
				>
				<label class="checkbox-label" for="gitter"
					><input
						name="improved"
						class="inline"
						id="gitter"
						type="checkbox"
						value="gitter"
					/>
					Gitter help rooms</label
				>
				<label class="checkbox-label" for="videos"
					><input
						name="improved"
						class="inline"
						id="videos"
						type="checkbox"
						value="videos"
					/>
					Videos</label
				>
				<label class="checkbox-label" for="city-meetups"
					><input
						name="improved"
						class="inline"
						id="city-meetups"
						type="checkbox"
						value="city-meetups"
					/>
					City Meetups</label
				>
				<label class="checkbox-label" for="wiki"
					><input
						name="improved"
						class="inline"
						id="wiki"
						type="checkbox"
						value="wiki"
					/>
					Wiki</label
				>
				<label class="checkbox-label" for="forum"
					><input
						name="improved"
						class="inline"
						id="forum"
						type="checkbox"
						value="forum"
					/>
					Forum</label
				>
				<label class="checkbox-label" for="additional-courses"
					><input
						name="improved"
						class="inline"
						id="additional-courses"
						type="checkbox"
						value="additional-courses"
					/>
					Additional Courses</label
				>

				<label class="comments-label" for="comments"
					>Any comments or suggestions</label
				>
				<textarea
					name="comments"
					id="comments"
					placeholder="Enter your comment here..."
				></textarea>

				<button type="submit">Submit</button>
			</form>
		</main>
	</body>
</html>
